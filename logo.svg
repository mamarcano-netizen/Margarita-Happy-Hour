<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <defs>
    <linearGradient id="fluteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFAF0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EDD57A" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="champagneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7CF7A" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#F7CF7A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lipstickGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A02050"/>
      <stop offset="40%" stop-color="#E07090"/>
      <stop offset="100%" stop-color="#C04065"/>
    </linearGradient>
    <linearGradient id="lipCaseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C1030"/>
      <stop offset="100%" stop-color="#8B2042"/>
    </linearGradient>
  </defs>

  <!-- SPARKLES -->
  <g transform="translate(170, 72)">
    <path d="M0,-10 L1.5,-1.5 L10,0 L1.5,1.5 L0,10 L-1.5,1.5 L-10,0 L-1.5,-1.5 Z" fill="#D4AF37" opacity="0.9"/>
  </g>
  <g transform="translate(332, 60)">
    <path d="M0,-7 L1,-1 L7,0 L1,1 L0,7 L-1,1 L-7,0 L-1,-1 Z" fill="#C4526E" opacity="0.8"/>
  </g>
  <g transform="translate(155, 120)">
    <path d="M0,-5 L0.8,-0.8 L5,0 L0.8,0.8 L0,5 L-0.8,0.8 L-5,0 L-0.8,-0.8 Z" fill="#D4AF37" opacity="0.6"/>
  </g>
  <g transform="translate(348, 145)">
    <path d="M0,-5 L0.8,-0.8 L5,0 L0.8,0.8 L0,5 L-0.8,0.8 L-5,0 L-0.8,-0.8 Z" fill="#D4AF37" opacity="0.6"/>
  </g>
  <g transform="translate(185, 55)">
    <path d="M0,-3 L0.5,-0.5 L3,0 L0.5,0.5 L0,3 L-0.5,0.5 L-3,0 L-0.5,-0.5 Z" fill="#C4526E" opacity="0.5"/>
  </g>

  <!-- CHAMPAGNE FLUTE - liquid fill -->
  <path d="M 218,72 L 282,72 L 257,172 L 243,172 Z" fill="url(#champagneGrad)"/>

  <!-- CHAMPAGNE FLUTE - glass outline -->
  <path d="M 215,68 L 285,68 L 258,172 L 253,172 L 253,215 L 268,222 L 232,222 L 247,215 L 247,172 L 242,172 Z"
        fill="url(#fluteGrad)" stroke="#D4AF37" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Glass left highlight/shine -->
  <path d="M 222,72 L 228,68 L 236,140 L 230,142 Z" fill="rgba(255,255,255,0.28)"/>

  <!-- Bubbles -->
  <circle cx="248" cy="155" r="2.5" fill="#D4AF37" opacity="0.7"/>
  <circle cx="259" cy="135" r="1.8" fill="#D4AF37" opacity="0.6"/>
  <circle cx="251" cy="116" r="1.3" fill="#D4AF37" opacity="0.5"/>
  <circle cx="263" cy="153" r="1.5" fill="#D4AF37" opacity="0.5"/>
  <circle cx="245" cy="100" r="1.2" fill="#D4AF37" opacity="0.4"/>
  <circle cx="256" cy="104" r="1" fill="#D4AF37" opacity="0.35"/>

  <!-- LIPSTICK leaning out of glass -->
  <g transform="rotate(-35, 272, 75)">
    <!-- Tip angled cut -->
    <path d="M 266,20 L 278,20 L 278,35 L 272,42 L 266,35 Z" fill="url(#lipstickGrad)"/>
    <!-- Bullet body -->
    <rect x="266" y="35" width="12" height="45" fill="url(#lipstickGrad)"/>
    <!-- Bullet shine -->
    <rect x="267" y="22" width="3.5" height="55" rx="1" fill="rgba(255,255,255,0.28)"/>
    <!-- Gold band -->
    <rect x="264" y="78" width="16" height="5" rx="1" fill="#D4AF37"/>
    <!-- Case -->
    <rect x="264" y="83" width="16" height="30" rx="2.5" fill="url(#lipCaseGrad)"/>
    <!-- Case shine -->
    <rect x="265.5" y="84" width="3.5" height="27" rx="1" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- HAPPY HOUR text -->
  <text x="250" y="268"
        font-family="Georgia, Palatino, 'Book Antiqua', serif"
        font-size="44"
        font-style="italic"
        font-weight="bold"
        fill="#C4526E"
        text-anchor="middle"
        letter-spacing="1.5">Happy Hour</text>

  <!-- Gold divider with diamond center -->
  <line x1="90" y1="282" x2="222" y2="282" stroke="#D4AF37" stroke-width="1"/>
  <path d="M 250,274 L 258,282 L 250,290 L 242,282 Z" fill="#D4AF37"/>
  <line x1="278" y1="282" x2="410" y2="282" stroke="#D4AF37" stroke-width="1"/>

  <!-- with Margarita subtitle -->
  <text x="250" y="316"
        font-family="Georgia, Palatino, 'Book Antiqua', serif"
        font-size="21"
        font-style="italic"
        fill="#8B2042"
        text-anchor="middle"
        letter-spacing="6">with Margarita</text>

  <!-- Bottom decorative dots -->
  <circle cx="215" cy="340" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="228" cy="346" r="1.5" fill="#C4526E" opacity="0.45"/>
  <circle cx="250" cy="348" r="3" fill="#D4AF37" opacity="0.65"/>
  <circle cx="272" cy="346" r="1.5" fill="#C4526E" opacity="0.45"/>
  <circle cx="285" cy="340" r="2" fill="#D4AF37" opacity="0.5"/>
</svg>
